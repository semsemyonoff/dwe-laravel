# Local overrides for Docker/Compose execution policy.
# Copy to docker.local.yml and adjust as needed (gitignored).

# Override the project name (used as docker compose -p value):
# project_name: "my-custom-project"

# Override default args for specific commands:
# args:
#   global: ["--ansi", "always"]    # remove --progress tty
#   up: ["-d"]                      # remove --remove-orphans
#   logs: ["-f", "--tail", "100"]   # limit log output

# Disable automatic .env generation before lifecycle commands:
# env:
#   auto_generate: false

# Extra environment variables passed to every docker compose process.
# Use to suppress unwanted Docker CLI output:
# process_env:
#   DOCKER_CLI_HINTS: "false"
