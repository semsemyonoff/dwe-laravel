# Template for local overrides.
# Copy this file to local.yml and adjust as needed.
# local.yml is NOT tracked by git.

# Active state name, empty = no state.
# state: staging

# Override tool visibility (and per-tool host/port) without changing project defaults.
# tools:
#   redis_insight:
#     enabled: false
#   adminer:
#     enabled: true
#   mailpit:
#     port: 8026

# Override runtime ports/hosts (non-tool roles only — main, app, db, redis).
# runtime:
#   use_https: true
#   ports:
#     app: 8080

# Enable debug service (Xdebug container, adds compose overlay automatically).
# services:
#   main-debug:
#     enabled: true

# Enable second service (cloned from git, depends on main).
# services:
#   second:
#     enabled: true

# Override database credentials if needed (default: root / root).
# db:
#   user: myuser
#   password: mypassword

# Xdebug IDE key for cookie-based debug routing (default: PHPSTORM).
# debug:
#   idekey: VSCODE
