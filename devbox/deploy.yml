# Deploy pipeline declaration.
# Steps execute sequentially within each phase.
# .env generation is always performed first (implicit, not listed).
#
# Step types:
#   cmd:  — shell command (executed directly)
#   make: — Make target (executed via make -f Makefile <target>)
#
# Steps with make: can also be called during regular operation (e.g. make up).
# Steps with when: support three expression kinds:
#   - Go template "{{...}}"       — evaluated against config at plan time
#   - Builtin predicate            — e.g. "dir-empty services/main/src" (runtime)
#   - Shell command "cmd: <cmd>"  — evaluated at step-execution time (runtime)

phases:
  - name: setup
    description: Prepare service directories and install application
    steps:
      - name: create-dirs
        cmd: mkdir -p services/main/src services/main/configs services/main/logs services/main/home services/main/runtime
        description: Create service hub directories
      - name: install
        cmd: "docker compose --progress tty -p ${PROJECT_PREFIX}-${PROJECT_NAME} -f compose/installer.yml run --rm --quiet-pull -u $(id -u):$(id -g) app-install"
        when: "dir-empty services/main/src"
        description: Install Laravel project via installer container (skipped if already installed)
      - name: copy-configs
        service_configs_copy: main
        description: Copy template configs to service directory (files declared in devbox.yml services.main.configs)
        check: "cmd: ./bin/devbox deploy config-check main"

  - name: start
    description: Start containers and wait for health
    steps:
      - name: up
        make: up
        description: Start all containers
      - name: wait-healthy
        cmd: ./bin/devbox compose wait
        description: Wait for all containers to become healthy

  - name: init
    description: Initialize application (database, dependencies, keys)
    steps:
      - name: db-create
        make: db-create
        description: Create application database
      - name: composer-install
        make: composer-install
        description: Install PHP dependencies
      - name: key-generate
        make: key-generate
        description: Generate Laravel application key
      - name: migrate
        make: migrate
        description: Run database migrations
