# Deploy pipeline orchestrator.
# .env generation is always performed first (implicit, not listed).
#
# Phases with deploy_services: true are markers — CLI resolves them by
# inlining per-service deploy pipelines (from devbox/deploy/<service>.yml)
# in topological dependency order. Only enabled services are included.
#
# Step types (set on `type:`, payload in `cmd:`):
#   shell    — host shell command (sh -c)
#   devbox   — devbox CLI subcommand
#   command  — declarative command ID dispatched via command runner
#   builtin  — Go builtin step (e.g. service_dirs_ensure, message, confirm)

phases:
  - name: services
    deploy_services: true
    description: Deploy all enabled services (resolved by dependency order)

  - name: start
    description: Start containers and wait for health
    steps:
      - name: up
        type: devbox
        cmd: "docker up"
        description: Start all containers
      - name: wait-healthy
        type: devbox
        cmd: "docker wait"
        description: Wait for all containers to become healthy

  - name: post-deploy
    description: Post-deploy summary (runs only if all prior phases succeeded)
    untracked: true
    steps:
      - name: info
        type: devbox
        cmd: "info"
        description: Show environment summary
      - name: success
        type: builtin
        cmd: message
        with:
          level: success
          text: Deploy completed successfully
        description: Print deploy success message
