sections:
  - id: devbox_info
    items:
      - type: subgroup
        title: Devbox
        items:
          - type: definition
            name: Project
            value: "{{ .Project.FullName }}"
          - type: definition
            name: State
            value: "{{ .State }}"
            when: "{{ .State }}"

  - id: urls
    title: URLs
    items:
      - type: subgroup
        title: Main
        items:
          - type: definition
            name: URL
            icon: "🔗"
            value: "{{ appURL .Runtime.Hosts.main .Runtime.Ports.app .Runtime.UseHTTPS }}"
          - type: definition
            name: SPX profiler
            value: "{{ appURL .Runtime.Hosts.main .Runtime.Ports.app .Runtime.UseHTTPS .Runtime.SPX.Path }}"
            when: "{{ .Runtime.SPX.Path }}"
      - type: subgroup
        title: Tools
        items:
          - type: definition
            name: "Adminer"
            icon: "🛢"
            value: '{{ appURL .Tools.adminer.Host .Runtime.Ports.app .Runtime.UseHTTPS }} | {{ appURL "" .Tools.adminer.Port .Runtime.UseHTTPS }}'
            when: "{{ .Tools.adminer.Enabled }}"
          - type: definition
            name: "Redis Insight"
            icon: "📕"
            value: '{{ appURL .Tools.redis_insight.Host .Runtime.Ports.app .Runtime.UseHTTPS }} | {{ appURL "" .Tools.redis_insight.Port .Runtime.UseHTTPS }}'
            when: "{{ .Tools.redis_insight.Enabled }}"
          - type: definition
            name: "Mailpit"
            icon: "📨"
            value: '{{ appURL .Tools.mailpit.Host .Runtime.Ports.app .Runtime.UseHTTPS }} | {{ appURL "" .Tools.mailpit.Port .Runtime.UseHTTPS }}'
            when: "{{ .Tools.mailpit.Enabled }}"

  - id: hosts
    title: Hosts
    hide_on_empty: true
    items:
      - type: warning
        text: "Please, make sure this is added to your /etc/hosts file:"
        decorative: true
      - type: info
        text: "127.0.0.1\t{{ .Runtime.Hosts.main }}"
        when: '{{ not (hasSuffix ".localhost" .Runtime.Hosts.main) }}'
      - type: info
        text: "127.0.0.1\t{{ .Tools.adminer.Host }}"
        when: '{{ and .Tools.adminer.Enabled (not (hasSuffix ".localhost" .Tools.adminer.Host)) }}'
      - type: info
        text: "127.0.0.1\t{{ .Tools.redis_insight.Host }}"
        when: '{{ and .Tools.redis_insight.Enabled (not (hasSuffix ".localhost" .Tools.redis_insight.Host)) }}'
      - type: info
        text: "127.0.0.1\t{{ .Tools.mailpit.Host }}"
        when: '{{ and .Tools.mailpit.Enabled (not (hasSuffix ".localhost" .Tools.mailpit.Host)) }}'

footer: true
