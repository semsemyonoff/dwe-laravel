# Reset pipeline for the devbox project.
# Executed via: devbox reset run [--yes]
#
# Step types (set on `type:`, payload in `cmd:`):
#   shell    — host shell command (sh -c)
#   devbox   — devbox CLI subcommand
#   command  — declarative command ID dispatched via command runner
#   builtin  — engine-internal action (confirm, docker_remove_project_volumes, remove_paths, ...)

phases:
  - name: pre
    description: Confirm destructive reset
    untracked: true
    steps:
      - name: confirm
        type: builtin
        cmd: confirm
        with:
          message: "This will stop containers, remove project volumes, and delete generated data."
        description: Confirm before proceeding with destructive operations

  - name: stop
    description: Stop all containers
    steps:
      - name: down
        type: devbox
        cmd: "docker down"
        description: Stop and remove all project containers

  - name: cleanup
    description: Remove volumes and generated service data
    steps:
      - name: remove-volumes
        type: builtin
        cmd: docker_remove_project_volumes
        description: Remove all Docker volumes belonging to this project
      - name: remove-services
        type: builtin
        cmd: remove_paths
        with:
          paths:
            - services/
        description: Remove generated service hub directories
