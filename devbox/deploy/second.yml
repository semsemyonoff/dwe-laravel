# Deploy pipeline for service: second
# Source is cloned from git instead of installed via installer.
# Depends on main (declared in services.yml — deploy order is enforced by orchestrator).

phases:
  - name: setup
    description: Prepare service directories and clone repository
    steps:
      - name: create-dirs
        type: builtin
        cmd: service_dirs_ensure
        with:
          service: second
        description: Create service hub directories
      - name: git-clone
        type: shell
        cmd: git clone ssh://git@git.horn:2222/semsemyonoff/laravel-test-service.git services/second/src
        when:
          type: builtin
          cmd: "dir-empty services/second/src"
        description: Clone repository (skipped if already cloned)
      - name: copy-configs
        type: builtin
        cmd: service_configs_copy
        with:
          service: second
          mode: replace
        description: Copy template configs to service directory (files declared in services.second.configs)
        check:
          type: builtin
          cmd: service_configs_check
          with:
            service: second

  - name: init
    description: Initialize application (database, dependencies, keys)
    when:
      type: builtin
      cmd: "dir-empty services/second/src/vendor"
    steps:
      - name: db-start
        type: command
        cmd: db.start
        description: Start database container and wait until healthy
      - name: db-create-second
        type: command
        cmd: services.second.db.create
        description: Create application database for second service
      - name: composer-install-second
        type: command
        cmd: services.second.composer-install
        description: Install PHP dependencies
      - name: key-generate-second
        type: command
        cmd: services.second.key-generate
        description: Generate Laravel application key
      - name: migrate-second
        type: command
        cmd: services.second.migrate
        description: Run database migrations

  - name: finalize
    description: Generate IDE configuration files
    steps:
      - name: render-ide
        type: devbox
        cmd: "render ide second"
        description: Generate IDE configs for second service
