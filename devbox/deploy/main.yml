# Deploy pipeline for service: main
# Steps execute sequentially within each phase.
#
# Step types:
#   run:     — shell command (executed directly)
#   devbox:  — public devbox CLI command
#   command: — devbox command ID dispatched via command runner
#   builtin: — engine-internal action

phases:
  - name: setup
    description: Prepare service directories and install application
    when: "dir-empty services/main/src"
    steps:
      - name: create-dirs
        run: mkdir -p services/main/src services/main/configs services/main/logs services/main/home services/main/runtime
        description: Create service hub directories
      - name: install
        command: app.install
        description: Install Laravel project via installer container
      - name: copy-configs
        builtin: service_configs_copy
        with:
          service: main
          mode: replace
        description: Copy template configs to service directory (files declared in devbox.yml services.main.configs)
        check: "cmd: ./bin/devbox deploy config-check main"

  - name: init
    description: Initialize application (database, dependencies, keys)
    steps:
      - name: db-start
        command: db.start
        description: Start database container and wait until healthy
      - name: db-create
        command: services.main.db.create
        description: Create application database
      - name: composer-install
        command: services.main.composer-install
        description: Install PHP dependencies
      - name: key-generate
        command: services.main.key-generate
        description: Generate Laravel application key
      - name: migrate
        command: services.main.migrate
        description: Run database migrations
