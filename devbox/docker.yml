# Docker/Compose execution policy.
# Loaded separately — not merged with the 3-layer devbox config.
# Override locally via devbox/docker.local.yml (gitignored).

project_name: "${project.prefix}-${project.name}"

args:
  global: ["--ansi", "always", "--progress", "tty"]
  up: ["-d", "--remove-orphans"]
  logs: ["-f"]
  run: ["--rm"]

env:
  auto_generate: true
  commands: [up, run, exec, restart]

topology:
  # Compose services to hide from the topology tree and health calculation.
  # Useful for init containers that run once and exit (e.g. redis-insight-setup).
  hidden: [redis-insight-setup]

resources:
  volumes:
    composer_cache:
      name: devbox_composer_cache
      shared: true
      ensure_before: [up, deploy]
