group:
  title: Second Service
  description: Commands for the second Laravel application service

commands:
  composer-install:
    type: service_exec
    description: Install PHP dependencies via Composer
    service: app-second
    user: current
    workdir_from: services.second.work_dir_internal
    mode: exec-or-run
    argv:
      - composer
      - install
      - --ansi
      - --prefer-dist
      - --no-interaction
      - --optimize-autoloader

  key-generate:
    type: service_exec
    description: Generate the Laravel application key
    service: app-second
    user: current
    workdir_from: services.second.work_dir_internal
    mode: exec-or-run
    argv:
      - php
      - artisan
      - "key:generate"

  migrate:
    type: service_exec
    description: Run Laravel database migrations
    service: app-second
    user: current
    workdir_from: services.second.work_dir_internal
    mode: exec-or-run
    argv:
      - php
      - artisan
      - migrate

  bootstrap:
    type: workflow
    description: Full bootstrap — start db, create database, install deps, generate key, run migrations
    steps:
      - command: db.start
      - command: services.second.db.create
      - command: services.second.composer-install
      - command: services.second.key-generate
      - command: services.second.migrate
