group:
  title: Database
  description: Database container management commands

commands:
  up:
    type: devbox
    private: true
    description: Start the database container in the background
    cmd: "docker up db"

  wait:
    type: shell
    private: true
    description: Wait for the db container to become healthy
    cmd: |
      set -eu
      cid=$(docker compose ps -q db)
      if [ -z "$cid" ]; then
        echo "db container is not running" >&2
        exit 1
      fi
      for _ in $(seq 1 60); do
        status=$(docker inspect -f '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "")
        case "$status" in
          healthy) exit 0 ;;
          unhealthy) echo "db is unhealthy" >&2; exit 1 ;;
          ""|none) exit 0 ;;
        esac
        sleep 2
      done
      echo "db did not become healthy in 120s" >&2
      exit 1

  create:
    type: service_exec
    description: Create a database in the db container
    service: db
    mode: exec-or-run
    params:
      database:
        type: string
        description: Database name to create
        required: true
        pattern: ^[a-zA-Z0-9_][a-zA-Z0-9_-]*$
    env:
      MYSQL_PWD: "${db.password}"
    messages:
      success: "Database `${param.database}` is ready."
      error: "Failed to create database `${param.database}`."
    cmd: "mariadb -u${db.user} -e 'CREATE DATABASE IF NOT EXISTS `${param.database}` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;'"
  drop:
    type: service_exec
    description: Drop the database in the db container
    service: db
    mode: exec-or-run
    confirmation: true
    confirmation_text: Are you sure you want to drop the database `${param.database}`?
    params:
      database:
        type: string
        description: Database name to drop
        required: true
        pattern: ^[a-zA-Z0-9_][a-zA-Z0-9_-]*$
    env:
      MYSQL_PWD: "${db.password}"
    messages:
      success: "Database `${param.database}` was dropped if it existed."
      error: "Failed to drop database `${param.database}`."
    cmd: "mariadb -u${db.user} -e 'DROP DATABASE IF EXISTS `${param.database}`;'"
  cli:
    type: service_exec
    description: Connect to the database in the db container
    service: db
    mode: exec-or-run
    params:
      database:
        type: string
        description: Database name to connect
    env:
      MYSQL_PWD: "${db.password}"
    cmd: "mariadb -u${db.user} {{with .Params.database}} -D{{.}}{{end}}"

  start:
    type: workflow
    private: true
    description: Start the database container and wait until healthy
    steps:
      - command: db.up
      - command: db.wait

  dump-create:
    type: script
    description: Create a database dump file
    params:
      database:
        type: string
        description: Database name to dump
        default_from: db.database
        pattern: ^[a-zA-Z0-9_][a-zA-Z0-9_-]*$
      dump_dir:
        type: string
        description: Directory to store the dump file
        default_from: db.backup_dir
        required: true
        pattern: ^[^*?\[\]]+$
      dump_date:
        type: bool
        description: Include date suffix in filename
        default: true
    env:
      DB_NAME: "${param.database}"
      DB_USER: "${db.user}"
      MYSQL_PWD: "${db.password}"
    files:
      dump:
        access: write
        path: "${param.dump_dir}/${param.database}{{ if .Params.dump_date }}_{{ now | date \"2006-01-02\" }}{{ end }}.sql.gz"
        mkdir: true
        overwrite: true
        on_error: remove
        env: DUMP_FILE
    script:
      path: devbox/scripts/db/dump-create.sh
      shell: bash
    messages:
      success: "Database dump created at ${files.dump.path}"
      error: "Failed to create database dump"

  dump-deploy:
    type: script
    description: Restore a database from a dump file
    confirmation: true
    confirmation_text: "This will DROP and recreate database '${param.target_database}'. Continue?"
    params:
      database:
        type: string
        description: Source database (for backup reference, if needed)
        default_from: db.database
        pattern: ^[a-zA-Z0-9_][a-zA-Z0-9_-]*$
      target_database:
        type: string
        description: Target database to restore to
        default_from: db.database
        required: true
        pattern: ^[a-zA-Z0-9_][a-zA-Z0-9_-]*$
      dump_dir:
        type: string
        description: Directory containing dump files
        default_from: db.backup_dir
        required: true
        pattern: ^[^*?\[\]]+$
      check_exists:
        type: bool
        description: Check if target database exists before restore
        default: false
    env:
      DB_NAME: "${param.database}"
      TARGET_DB_NAME: "${param.target_database}"
      CHECK_EXISTS: "{{ if .Params.check_exists }}1{{ else }}0{{ end }}"
      DB_USER: "${db.user}"
      MYSQL_PWD: "${db.password}"
    files:
      dump:
        access: read
        candidates:
          - glob: "${param.dump_dir}/${param.database}_*.sql.gz"
            match: '\d{4}-\d{2}-\d{2}'
            sort: name_desc
          - path: "${param.dump_dir}/${param.database}.sql.gz"
        required: true
        env: DUMP_FILE
    script:
      path: devbox/scripts/db/dump-deploy.sh
      shell: bash
    messages:
      success: "Database restored from ${files.dump.path}"
      error: "Failed to restore database"
