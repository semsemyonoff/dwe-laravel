group:
  title: Database
  description: Database container management commands

commands:
  up:
    type: command
    private: true
    description: Start the database container in the background
    run: |
      COMPOSE_FILES=$(./bin/devbox compose files) || exit 1
      if [ -z "$COMPOSE_FILES" ]; then echo "error: compose files list is empty — config invalid" >&2; exit 1; fi
      docker compose -p ${project.prefix}-${project.name} $(echo "$COMPOSE_FILES" | sed 's/^/-f /' | tr '\n' ' ') up -d db

  wait:
    type: command
    private: true
    description: Wait for all containers to become healthy
    run: "./bin/devbox compose wait"

  start:
    type: workflow
    private: true
    description: Start the database container and wait until healthy
    steps:
      - command: db.up
      - command: db.wait
