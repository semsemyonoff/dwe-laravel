header:
  ascii:
    lines:
      - "Welcome to"
      - "Devbox Next"
    font: doom
    color: red

sections:
  - id: devbox_info
    items:
      - type: subheader
        text: Devbox
      - type: definition
        name: Project
        value: "{{ .Project.FullName }}"
      - type: definition
        name: State
        value: "{{ .State }}"
        when: "{{ .State }}"

  - id: urls
    title: URLs
    items:
      - type: subheader
        text: Main
      - type: definition
        name: URL
        icon: "🔗"
        value: "{{ appURL .Runtime.Hosts.Main .Runtime.Ports.App .Runtime.UseHTTPS }}"
      - type: definition
        name: SPX profiler
        value: "{{ appURL .Runtime.Hosts.Main .Runtime.Ports.App .Runtime.UseHTTPS .Runtime.SPX.Path }}"
        when: "{{ .Runtime.SPX.Path }}"
      - type: subheader
        text: Tools
        when: "{{ .Tools.AnyEnabled }}"
      - type: definition
        name: "Adminer"
        icon: "🛢"
        value: '{{ appURL .Runtime.Hosts.Adminer .Runtime.Ports.App .Runtime.UseHTTPS }} | {{ appURL "" .Runtime.Ports.Adminer .Runtime.UseHTTPS }}'
        when: "{{ .Tools.Adminer.Enabled }}"
      - type: definition
        name: "Redis Insight"
        icon: "📕"
        value: '{{ appURL .Runtime.Hosts.RedisInsight .Runtime.Ports.App .Runtime.UseHTTPS }} | {{ appURL "" .Runtime.Ports.RedisInsight .Runtime.UseHTTPS }}'
        when: "{{ .Tools.RedisInsight.Enabled }}"
      - type: definition
        name: "Mailpit"
        icon: "📨"
        value: '{{ appURL .Runtime.Hosts.Mailpit .Runtime.Ports.App .Runtime.UseHTTPS }} | {{ appURL "" .Runtime.Ports.Mailpit .Runtime.UseHTTPS }}'
        when: "{{ .Tools.Mailpit.Enabled }}"

  - id: hosts
    title: Hosts
    items:
      - type: warning
        text: "Please, make sure this is added to your /etc/hosts file:"
      - type: info
        text: "127.0.0.1\t{{ .Runtime.Hosts.Main }}"
      - type: info
        text: "127.0.0.1\t{{ .Runtime.Hosts.Adminer }}"
        when: "{{ .Tools.Adminer.Enabled }}"
      - type: info
        text: "127.0.0.1\t{{ .Runtime.Hosts.RedisInsight }}"
        when: "{{ .Tools.RedisInsight.Enabled }}"
      - type: info
        text: "127.0.0.1\t{{ .Runtime.Hosts.Mailpit }}"
        when: "{{ .Tools.Mailpit.Enabled }}"

  - id: commands
    title: General commands
    items:
      - type: subheader
        text: Devbox
      - type: definition
        name: deploy
        value: deploy project (first-time setup)
      - type: definition
        name: deploy_reset
        value: stop containers and remove all service data
      - type: definition
        name: up
        value: start project
      - type: definition
        name: down
        value: stop and remove containers
      - type: definition
        name: stop
        value: stop project
      - type: definition
        name: restart
        value: "restart (stop & run) project"
      - type: subheader
        text: CLI
      - type: definition
        name: cli
        value: connect to app-main container
      - type: definition
        name: cli_root
        value: connect to app-main container as root

  - id: devbox_commands
    title: Devbox CLI commands
    items:
      - type: subheader
        text: Topology
      - type: definition
        name: "devbox services"
        value: show services and tools topology table
      - type: definition
        name: "devbox compose files"
        value: print resolved compose file list (base + enabled overlays)
      - type: definition
        name: "devbox docker wait"
        value: poll container health until all healthy or timeout
      - type: subheader
        text: Deploy
      - type: definition
        name: "devbox deploy plan"
        value: show resolved deploy plan with all enabled steps
      - type: definition
        name: "devbox deploy plan --format=shell"
        value: emit deploy plan as executable shell commands
      - type: definition
        name: "devbox deploy step <phase>/<step>"
        value: run a single named deploy step
      - type: definition
        name: "devbox deploy config <service>"
        value: copy template configs to service directory
      - type: subheader
        text: Commands
      - type: definition
        name: "devbox command list"
        value: show all available commands grouped by category
      - type: definition
        name: "devbox command list --all"
        value: include private commands (marked with indicator)
      - type: definition
        name: "devbox command inspect <id>"
        value: show full command definition (type, params, context, runner)
      - type: definition
        name: "devbox command run <id>"
        value: run a command by its full ID (e.g. services.main.composer-install)
      - type: definition
        name: "devbox command run <id> --set key=val"
        value: run a command with param overrides
      - type: subheader
        text: Render
      - type: definition
        name: "devbox render env"
        value: generate .env from config export rules
      - type: definition
        name: "devbox render ide"
        value: generate IDE configs (devcontainer, VS Code) into service dirs

footer: true
