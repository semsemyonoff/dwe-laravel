# Docker/Compose execution policy.
# Loaded separately — not merged with the 3-layer dwe config.
# Override locally via workspace/docker.local.yml (gitignored).
#
# Everything else (project name, per-command args, .env auto-generation,
# topology) uses dwe defaults. project_name defaults to `${project.prefix}-${project.name}`.
# Only `resources` is declared here: the shared composer_cache volume the
# compose files mount as external.

resources:
  volumes:
    composer_cache:
      name: dwe_composer_cache
      shared: true
      ensure_before: [up, deploy]
