# Versioned project defaults (layer 2 of the merged config).
# Merged on top of workspace.yml and may be overridden by workspace/local.yml.
# This file IS tracked by git.
#
# workspace.yml (layer 1) carries only project identity + the `update:`/`compose`
# policy. This layer holds the bulky configuration: the `services` overlay,
# `runtime`, the `vars:` sandbox, `exports:` (.env render spec) and `bridge:`
# (host-bridge container-write policy).

# Optional service toggles. Structural service definitions live in
# workspace/services/<name>/service.yml. Required services (e.g. main, and the
# base infra: nginx/db in docker-compose.yml) are always on — no toggle here.
services:
  main-debug:
    enabled: false
  dbgate:
    enabled: false
  mailpit:
    enabled: false

runtime:
  use_https: false
  ports:
    db: 13306
  spx:
    path: ""

# Free-form, project-specific values. The merged config root is strict (only
# project/runtime/state/exports/compose/ui/docs/services/vars/update/bridge are
# allowed top-level keys), so every custom value lives under this single
# sandbox. Reference these by dot-path with the `vars.` prefix: `${vars.db.user}`
# in commands and config templates, `from: vars.db.database` in exports.
vars:
  debug:
    idekey: PHPSTORM

  # Database connection. database/user/password back the rendered Laravel .env
  # (workspace/templates/config/main/env.tmpl) and the db.* commands; they are
  # container-writable via bridge.vars_writable. backup_dir is the host dir the
  # dump-create / dump-deploy commands read & write.
  db:
    database: laravel
    user: root
    password: root
    backup_dir: backups/db

# Active state name, empty = no state.
state: ""

# Host-bridge container-write policy. `services.main.bridge.enabled` (in
# service.yml) opts the app-main container into the bridge; this top-level block
# is the project-wide allowlist of vars a containerized `dwe vars set` may write
# back to the host local.yml. The .env-backing db params are writable so a
# developer can retune them from inside the dev container (apply with a redeploy).
bridge:
  vars_writable:
    - vars.db.*

# Declarative export spec for the generated .env artifact.
# dwe render env  →  reads exports.env and renders .env accordingly.
#
# Each rule:
#   name     — env variable name
#   from     — dot-path into the effective (merged) config
#   default  — fallback when the path is absent
#   required — error if path is absent and default is empty
#   format   — string (default) | bool | int
#   when     — dot-path; rule is skipped when the value at this path is falsy
#   comment  — written as "# comment" above the variable in the generated file
exports:
  env:
    - name: USE_HTTPS
      from: runtime.use_https
      format: bool

    - name: APP_PORT
      from: services.nginx.ports.http
      format: int

    - name: DB_PORT
      from: runtime.ports.db
      format: int

    - name: APP_HOST
      from: services.main.hosts.web

    - name: DBGATE_PORT
      from: services.dbgate.ports.http
      format: int
      when: services.dbgate.enabled

    - name: DBGATE_HOST
      from: services.dbgate.hosts.web
      when: services.dbgate.enabled

    - name: MAILPIT_PORT
      from: services.mailpit.ports.http
      format: int
      when: services.mailpit.enabled

    - name: MAILPIT_HOST
      from: services.mailpit.hosts.web
      when: services.mailpit.enabled

    - name: TOOL_DBGATE
      from: services.dbgate.enabled
      format: bool

    - name: TOOL_MAILPIT
      from: services.mailpit.enabled
      format: bool

    - name: SPX_PATH
      from: runtime.spx.path

    - name: XDEBUG_IDEKEY
      from: vars.debug.idekey

    - name: STATE
      from: state

    - name: PROJECT_PREFIX
      from: project.prefix

    - name: PROJECT_NAME
      from: project.name

    - name: APP_MAIN_CONTAINER
      from: services.main.container

    - name: APP_MAIN_DIR_INTERNAL
      from: services.main.work_dir_internal

    - name: DB_DATABASE
      from: vars.db.database

    - name: DB_PASSWORD
      from: vars.db.password

    - name: DB_USER
      from: vars.db.user
