# Base compose: mandatory infrastructure (nginx, db, redis, app-main).
# Always started. Overlays in compose/ add optional services.

name: "${PROJECT_PREFIX:-devbox}_${PROJECT_NAME:-laravel}"

volumes:
  db:
  composer_cache:
    external: true
    name: devbox_composer_cache

networks:
  default:
    name: ${PROJECT_PREFIX:-devbox}_${PROJECT_NAME:-laravel}

services:
  nginx:
    image: "${IMAGE_NGINX:-nginx:latest}"
    container_name: "${PROJECT_PREFIX:-devbox}_${PROJECT_NAME:-laravel}-nginx"
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./services/main/src:/workspace/src:ro
      - ./configs/nginx/conf/common/fastcgi.conf:/etc/nginx/conf.d/common/fastcgi.conf:ro
      - ./configs/nginx/templates/common/backend.conf.template:/etc/nginx/templates/backend.conf.template:ro
      - ./configs/nginx/templates/services/main.conf.template:/etc/nginx/templates/main.conf.template:ro
    environment:
      APP_HOST: "${APP_HOST:-app.localhost}"
      XDEBUG_IDEKEY: "${XDEBUG_IDEKEY:-PHPSTORM}"
      DEBUG_BACKEND: "${DEBUG_BACKEND:-app-main}"
    depends_on:
      - app-main

  db:
    image: "${IMAGE_DB:-mariadb:lts}"
    container_name: "${PROJECT_PREFIX:-devbox}_${PROJECT_NAME:-laravel}-db"
    hostname: db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 3s
      timeout: 2s
      retries: 50
      start_period: 5s
    ports:
      - "${DB_PORT:-13306}:3306"
    volumes:
      - db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-root}"

  redis:
    image: "${IMAGE_REDIS:-redis:latest}"
    container_name: "${PROJECT_PREFIX:-devbox}_${PROJECT_NAME:-laravel}-redis"
    hostname: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 50
      start_period: 5s
    ports:
      - "${REDIS_PORT:-6379}:6379"

  app-main:
    build:
      context: images/services/main
      args:
        APP_UID: "${UID:-1000}"
        APP_GID: "${GID:-1000}"
    container_name: "${PROJECT_PREFIX:-devbox}_${PROJECT_NAME:-laravel}-app-main"
    hostname: main
    restart: unless-stopped
    working_dir: /workspace/src
    extra_hosts:
      - host.docker.internal:host-gateway
      - "${APP_HOST:-app.localhost}:host-gateway"
    volumes:
      - ./services/main:/workspace
      - ./services/main/home:/home/www-data
      - ~/.ssh:/home/www-data/.ssh:ro
      - ./services/main/logs:/workspace/src/storage/logs
      - ./services/main/configs/.env:/workspace/src/.env
      - composer_cache:/home/www-data/.composer/cache
    environment:
      COMPOSER_CACHE_DIR: /home/www-data/.composer/cache
    env_file:
      - ./configs/env/default.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
