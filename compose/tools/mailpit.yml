# Overlay: Mailpit — SMTP capture for local email testing.
# Enabled when tools.mailpit.enabled = true in devbox config.

services:
  mailpit:
    image: "${IMAGE_MAILPIT:-axllent/mailpit:latest}"
    container_name: "${PROJECT_FULL:-devbox-laravel}-mailpit"
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
