# Overlay: Adminer — lightweight DB management UI.
# Enabled when tools.adminer.enabled = true in devbox config.

services:
  adminer:
    image: "${IMAGE_ADMINER:-adminer:latest}"
    container_name: "${PROJECT_FULL:-devbox-laravel}-adminer"
    hostname: adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
