# Overlay: app-second — PHP-FPM container for the second Laravel service.
# Enabled when services.second.enabled = true in devbox config.
# Source is cloned from git, not installed via installer.

services:
  nginx:
    volumes:
      - ./services/second/src:/workspace/second:ro
      - ./configs/nginx/templates/services/second.conf.template:/etc/nginx/templates/second.conf.template:ro
    environment:
      APP_SECOND_HOST: "${APP_SECOND_HOST:-second.localhost}"
    depends_on:
      - app-second

  app-second:
    build:
      context: images/services/second
      args:
        APP_UID: "${UID:-1000}"
        APP_GID: "${GID:-1000}"
    container_name: "${PROJECT_PREFIX:-devbox}-${PROJECT_NAME:-laravel}-app-second"
    hostname: second
    restart: unless-stopped
    working_dir: /workspace/src
    extra_hosts:
      - host.docker.internal:host-gateway
      - "${APP_SECOND_HOST:-second.localhost}:host-gateway"
    volumes:
      - ./services/second:/workspace
      - ./services/second/home:/home/www-data
      - ~/.ssh:/home/www-data/.ssh:ro
      - ./services/second/logs:/workspace/src/storage/logs
      - ./services/second/configs/.env:/workspace/src/.env
    env_file:
      - ./configs/env/default.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app-main:
        condition: service_started
