# Overlay: app-main-debug — PHP-FPM container with Xdebug enabled.
# Enabled when services.main-debug.enabled = true in devbox config.
# Mounts services/main/runtime for profiler output and Xdebug traces.
# Also overrides nginx DEBUG_BACKEND so xdebug-cookie requests route here.

services:
  nginx:
    environment:
      DEBUG_BACKEND: app-main-debug

  app-main-debug:
    extends:
      file: compose.yaml
      service: app-main
    container_name: "${PROJECT_PREFIX:-devbox}-${PROJECT_NAME:-laravel}-app-main-debug"
    hostname: main-debug
    volumes:
      - ./services/main/runtime:/tmp
    environment:
      PHP_ENABLE_XDEBUG: "true"
      DBGP_IDEKEY: "${XDEBUG_IDEKEY:-PHPSTORM}"
      PHP_IDE_CONFIG: "serverName=${APP_HOST:-app.localhost}"
    depends_on:
      app-main:
        condition: service_started
