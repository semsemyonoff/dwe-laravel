# Standalone installer compose file — used only during deploy.
# Not part of the regular compose file list (not an overlay).
# Used by: devbox deploy step setup/install
# Command: docker compose -f compose/installer.yml run --rm -u $(id -u) -w /var/www app-installer composer create-project ...
#
# NOTE: Paths are relative to this file's directory (compose/).
# ../services/main and ../.env resolve to the repo root.
#
# NOTE: IMAGE_APP_INSTALLER defaults to composer:2 which bundles its own PHP.
# If your app image uses a non-default PHP version, set IMAGE_APP_INSTALLER
# in devbox/local.yml to an image matching your PHP version to avoid
# dependency resolution drift between the installer and runtime containers.

volumes:
  composer_cache:

services:
  app-installer:
    image: "${IMAGE_APP_INSTALLER:-composer:2}"
    container_name: "${PROJECT_FULL:-devbox-laravel}-app-installer"
    volumes:
      - ../services/main:/var/www
      - composer_cache:/home/www-data/.composer/cache
      - ${HOME}/.ssh:/home/www-data/.ssh:ro
    working_dir: /var/www
    env_file:
      - path: ../.env
        required: false
