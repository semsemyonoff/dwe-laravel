# Standalone installer compose file — used only during deploy.
# Not part of the regular compose file list (not an overlay).
# Used by: devbox deploy step setup/install
# Command: docker compose -f compose/installer.yml run --rm -u $(id -u) -w /var/www app-installer laravel new src ...

volumes:
  composer_cache:

services:
  app-installer:
    image: "${IMAGE_APP_INSTALLER:-php:8.3-cli}"
    container_name: "${PROJECT_FULL:-devbox-laravel}-app-installer"
    volumes:
      - ./services/main:/var/www
      - composer_cache:/home/www-data/.composer/cache
      - ~/.ssh:/home/www-data/.ssh:ro
    working_dir: /var/www
    env_file:
      - path: .env
        required: false
