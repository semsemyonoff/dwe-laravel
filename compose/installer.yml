# Standalone installer compose file — used only during deploy.
# Not part of the regular compose file list (not an overlay).
# Used by: devbox deploy step setup/install
# Command: docker compose -f compose/installer.yml run --rm -u $(id -u) -w /var/www app-installer composer create-project ...
#
# NOTE: Paths are relative to this file's directory (compose/).
# ../services/main and ../.env resolve to the repo root.
#
# NOTE: IMAGE_APP_INSTALLER comes from .env (generated by devbox render env).
# Override via devbox/local.yml: services.main.installer_image: your/image:tag
# This avoids dependency resolution drift between installer and runtime containers.

volumes:
  composer_cache:

services:
  app-installer:
    image: "${IMAGE_APP_INSTALLER:-composer:2}"
    container_name: "${PROJECT_PREFIX:-devbox}-${PROJECT_NAME:-laravel}-app-installer"
    volumes:
      - ../services/main:/var/www
      - composer_cache:/home/www-data/.composer/cache
    working_dir: /var/www
    env_file:
      - path: ../.env
        required: false
