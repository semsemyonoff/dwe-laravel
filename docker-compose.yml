# Base compose: mandatory infrastructure (nginx, db, app-main).
# Always started. Overlays in compose/ add optional services.

name: "${PROJECT_PREFIX:-dwe}_${PROJECT_NAME:-laravel}"

volumes:
  db:
  composer_cache:
    external: true
    name: dwe_composer_cache
  # Per-service named volume for VS Code Server data. Lives outside Docker
  # Desktop's `fakeowner` bind-mount FS, which corrupts files created with
  # mode 0400 (umask 377) — the exact pattern Dev Containers uses for the
  # connection-token handshake. Without this, attaching a dev container to
  # app-main from VS Code on Docker Desktop fails with `echo: I/O error`.
  vscode_server_main:

networks:
  default:
    name: ${PROJECT_PREFIX:-dwe}_${PROJECT_NAME:-laravel}

services:
  nginx:
    image: "${IMAGE_NGINX:-nginx:latest}"
    container_name: "${PROJECT_PREFIX:-dwe}_${PROJECT_NAME:-laravel}-nginx"
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./services/main/src:/workspace/src:ro
      - ./configs/nginx/conf/common/fastcgi.conf:/etc/nginx/conf.d/common/fastcgi.conf:ro
      - ./configs/nginx/templates/common/backend.conf.template:/etc/nginx/templates/backend.conf.template:ro
      - ./configs/nginx/templates/services/main.conf.template:/etc/nginx/templates/main.conf.template:ro
    environment:
      APP_HOST: "${APP_HOST:-app.localhost}"
      XDEBUG_IDEKEY: "${XDEBUG_IDEKEY:-PHPSTORM}"
      DEBUG_BACKEND: "${DEBUG_BACKEND:-app-main}"
    depends_on:
      - app-main

  db:
    image: "${IMAGE_DB:-mariadb:lts}"
    container_name: "${PROJECT_PREFIX:-dwe}_${PROJECT_NAME:-laravel}-db"
    hostname: db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 3s
      timeout: 2s
      retries: 50
      start_period: 5s
    ports:
      - "${DB_PORT:-13306}:3306"
    volumes:
      - db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-root}"

  app-main:
    build:
      context: images/services/main
      args:
        APP_UID: "${UID:-1000}"
        APP_GID: "${GID:-1000}"
    container_name: "${PROJECT_PREFIX:-dwe}_${PROJECT_NAME:-laravel}-app-main"
    hostname: main
    restart: unless-stopped
    working_dir: /workspace/src
    extra_hosts:
      - host.docker.internal:host-gateway
      - "${APP_HOST:-app.localhost}:host-gateway"
    volumes:
      - ./services/main:/workspace
      - ./services/main/home:/home/www-data
      - vscode_server_main:/home/www-data/.vscode-server
      - ~/.ssh:/home/www-data/.ssh:ro
      - ./services/main/configs/.env:/workspace/src/.env
      - composer_cache:/home/www-data/.composer/cache
    environment:
      COMPOSER_CACHE_DIR: /home/www-data/.composer/cache
    env_file:
      - ./configs/env/default.env
    depends_on:
      db:
        condition: service_healthy
